services:
  - type: web
    name: harun-karaca
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run deploy:prepare && npm run deploy:seed
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
